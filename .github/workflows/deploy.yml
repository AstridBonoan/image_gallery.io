name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist is a Vite production build
        run: |
          test -f dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo 'dist/index.html still references /src/main.tsx — build output invalid'
            exit 1
          fi
          if ! grep -q 'assets/index-' dist/index.html; then
            echo 'dist/index.html missing hashed bundle under assets/'
            cat dist/index.html
            exit 1
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

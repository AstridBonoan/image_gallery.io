# Publishes the Vite `dist/` folder to branch `gh-pages`.
# In repo Settings → Pages: use "Deploy from a branch" → Branch **gh-pages** → folder **/ (root)**.
# Do NOT publish from **main** / root — that serves raw source (including `/src/main.tsx`) and breaks the site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist is a Vite production build
        run: |
          test -f dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo 'dist/index.html still references /src/main.tsx — build output invalid'
            exit 1
          fi
          if ! grep -q 'assets/index-' dist/index.html; then
            echo 'dist/index.html missing hashed bundle under assets/'
            cat dist/index.html
            exit 1
          fi
      - name: Publish site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
